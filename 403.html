<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>403 · CR Store</title>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  :root{--orange:#ec6426;--orange-deep:#d2511c;--yellow:#f8a91f;--cream:#fde3cf;--brown:#632713;--muted:#9a7c69;--border:#efdccb;--soft:#f7ece2}
  body{font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#fff;color:var(--brown)}
  .topbar{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:20px;font-weight:700;color:var(--orange)}
  .logo b{color:var(--brown)}
  .topbar-hint{font-size:13px;color:var(--muted)}
  .page{min-height:calc(100vh - 65px);display:grid;grid-template-columns:1fr 1fr}
  .left{background:linear-gradient(135deg,#fff3ea 0%,var(--cream) 50%,#ffe9d6 100%);display:flex;align-items:center;justify-content:center;padding:60px;position:relative;overflow:hidden}
  .four-wrap{display:flex;align-items:center;justify-content:center;user-select:none}
  .num{font-size:clamp(100px,13vw,170px);font-weight:800;line-height:1;color:var(--orange);letter-spacing:-4px;text-shadow:0 6px 30px rgba(236,100,38,.25)}
  .lock{font-size:clamp(80px,10vw,128px);color:var(--orange);line-height:1;margin:0 6px;display:inline-block;filter:drop-shadow(0 6px 22px rgba(236,100,38,.25));animation:shake 3.5s ease-in-out infinite}
  @keyframes shake{0%,86%,100%{transform:rotate(0)}88%{transform:rotate(-12deg)}90%{transform:rotate(12deg)}92%{transform:rotate(-8deg)}94%{transform:rotate(8deg)}96%{transform:rotate(0)}}
  .shelf{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);display:flex;gap:14px}
  .lost-tile{width:64px;height:64px;border-radius:50%;background:#fff center/cover no-repeat;box-shadow:0 6px 16px rgba(99,39,19,.14);animation:float 3s ease-in-out infinite}
  .lost-tile:nth-child(2){animation-delay:.5s}
  .lost-tile:nth-child(3){animation-delay:1s}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .right{display:flex;align-items:center;justify-content:center;padding:60px}
  .copy{width:100%;max-width:400px}
  .copy h1{font-size:clamp(26px,3vw,34px);font-weight:700;color:var(--brown);line-height:1.3;margin-bottom:14px}
  .copy h1 span{color:var(--orange)}
  .copy p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:32px}
  .ctas{display:flex;gap:10px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:9999px;border:none;font-family:inherit;font-weight:600;cursor:pointer;font-size:15px;transition:all .18s;text-decoration:none}
  .btn-pri{background:var(--orange);color:#fff;padding:13px 26px}
  .btn-pri:hover{background:var(--orange-deep)}
  @media(max-width:760px){.page{grid-template-columns:1fr;grid-template-rows:auto 1fr}.left{padding:40px 20px;min-height:260px}.lost-tile{width:48px;height:48px;font-size:22px}.right{padding:40px 24px}.ctas{flex-direction:column}.btn{width:100%}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">CR <b>Store</b></div>
    <span class="topbar-hint">Recompensas da equipe CR</span>
  </div>
  <div class="page">
    <div class="left">
      <div>
        <div class="four-wrap">
          <span class="num">4</span>
          <i class="ph-fill ph-lock-key lock"></i>
          <span class="num">3</span>
        </div>
        <div class="shelf">
          <div class="lost-tile" style="background-image:url(/assets/images/stickers/3.png)"></div>
          <div class="lost-tile" style="background-image:url(/assets/images/stickers/8.png)"></div>
          <div class="lost-tile" style="background-image:url(/assets/images/stickers/5.png)"></div>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="copy">
        <h1>Essa área é <span>restrita</span></h1>
        <p>Seu cargo atual não permite visualizar esta página. Se acha que deveria ter acesso, fale com a Keila.</p>
        <div class="ctas">
          <a class="btn btn-pri" href="/carteira"><i class="ph-fill ph-house"></i> Voltar para o app</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
