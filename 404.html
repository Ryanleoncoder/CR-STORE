<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>404 · CR Store</title>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  :root{--orange:#1f1f1f;--orange-deep:#000000;--yellow:#f7c600;--yellow-deep:#e0b400;--cream:#fff7d6;--brown:#1a1a1a;--coral:#f28c52;--muted:#8a8a8a;--border:#e6e6e6;--soft:#f2f2f2}
  body{font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#fafafa;color:var(--brown)}
  .topbar{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:20px;font-weight:700;color:var(--brown)}
  .logo b{color:var(--brown)}
  .logo-cr{background:var(--yellow);color:var(--brown);padding:0 .22em;border-radius:.22em}
  .topbar-hint{font-size:13px;color:var(--muted)}
  .page{min-height:calc(100vh - 65px);display:grid;grid-template-columns:1fr 1fr}
  .left{background:linear-gradient(135deg,#fafafa 0%,#fff3c4 50%,#f3f3f3 100%);display:flex;align-items:center;justify-content:center;padding:60px;position:relative;overflow:hidden}
  .four-wrap{display:flex;align-items:center;justify-content:center;user-select:none}
  .num{font-size:clamp(100px,13vw,170px);font-weight:800;line-height:1;color:var(--brown);letter-spacing:-4px;text-shadow:0 6px 30px rgba(0,0,0,.15)}
  .glass{font-size:clamp(80px,10vw,132px);color:var(--brown);line-height:1;margin:0 4px;display:inline-block;filter:drop-shadow(0 6px 22px rgba(0,0,0,.18));animation:scan 4s ease-in-out infinite}
  @keyframes scan{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
  .shelf{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);display:flex;gap:14px}
  .lost-tile{width:64px;height:64px;border-radius:50%;background:#fff center/cover no-repeat;box-shadow:0 6px 16px rgba(0,0,0,.14);animation:float 3s ease-in-out infinite}
  .lost-tile:nth-child(2){animation-delay:.4s}
  .lost-tile:nth-child(3){animation-delay:.8s}
  .lost-tile:nth-child(4){animation-delay:1.2s}
  .lost-tile:nth-child(5){animation-delay:1.6s}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .right{display:flex;align-items:center;justify-content:center;padding:60px}
  .copy{width:100%;max-width:400px}
  .copy h1{font-size:clamp(26px,3vw,34px);font-weight:700;color:var(--brown);line-height:1.3;margin-bottom:14px}
  .copy h1 span{background:var(--yellow);color:var(--brown);padding:0 .22em;border-radius:.22em}
  .copy p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:32px}
  .ctas{display:flex;gap:10px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:9999px;border:none;font-family:inherit;font-weight:600;cursor:pointer;font-size:15px;transition:all .18s;text-decoration:none}
  .btn-pri{background:var(--yellow);color:var(--brown);padding:13px 26px}
  .btn-pri:hover{background:var(--yellow-deep)}
  .btn-sec{background:#fff;color:var(--brown);border:1px solid var(--border);padding:13px 24px}
  .btn-sec:hover{border-color:var(--brown);color:var(--brown)}
  @media(max-width:760px){.page{grid-template-columns:1fr;grid-template-rows:auto 1fr}.left{padding:40px 20px;min-height:260px}.lost-tile{width:48px;height:48px;font-size:22px}.right{padding:40px 24px}.ctas{flex-direction:column}.btn{width:100%}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo"><span class="logo-cr">CR</span> <b>Store</b></div>
    <span class="topbar-hint">Recompensas da equipe CR</span>
  </div>
  <div class="page">
    <div class="left">
      <div>
        <div class="four-wrap">
          <span class="num">4</span>
          <i class="ph-fill ph-magnifying-glass glass"></i>
          <span class="num">4</span>
        </div>
        <div class="shelf">
          <div class="lost-tile" style="background-image:url(/assets/images/stickers/1.png)"></div>
          <div class="lost-tile" style="background-image:url(/assets/images/stickers/4.png)"></div>
          <div class="lost-tile" style="background-image:url(/assets/images/stickers/9.png)"></div>
          <div class="lost-tile" style="background-image:url(/assets/images/stickers/2.png)"></div>
          <div class="lost-tile" style="background-image:url(/assets/images/stickers/6.png)"></div>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="copy">
        <h1>Ops! Essa página<br/>se perdeu no <span>estoque</span></h1>
        <p>O link está errado ou o produto saiu de cena. Mas tem bastante coisa esperando por você na loja!</p>
        <div class="ctas">
          <a class="btn btn-pri" href="/loja"><i class="ph-fill ph-storefront"></i> Ir para a loja</a>
          <a class="btn btn-sec" href="/carteira"><i class="ph-fill ph-wallet"></i> Ver minha carteira</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
