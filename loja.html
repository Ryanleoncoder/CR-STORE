<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loja · CR Store</title>
    <link rel="icon" type="image/webp" href="/assets/images/crcoins.webp" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header id="topo"></header>

    <main class="conteudo loja-conteudo">
      <div class="loja-header">
        <div>
          <h1>Loja</h1>
          <p class="sub">Resgate recompensas com seus CRcoins</p>
        </div>
        <a href="carrinho.html" class="cart-btn-link">
          <span class="cart-icon"><i class="ph-fill ph-shopping-cart"></i></span>
          <span class="cart-lbl-text">Carrinho</span>
          <span id="cart-badge" class="cart-badge-count" hidden>0</span>
        </a>
      </div>

      <div id="categorias" class="cat-strip"></div>
      <p id="loja-aviso" class="aviso"></p>
      <div id="produtos" class="grade"></div>
    </main>

    <script type="module" src="js/loja.js"></script>
  </body>
</html>
